events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    client_max_body_size 500M;

    # Redirect all HTTP local traffic to HTTPS
    server {
        listen 80;
        server_name 192.168.50.70;
        return 301 https://$host$request_uri;
    }

    # Secure Local Server
    server {
        listen 443 ssl;
        server_name 192.168.50.70;

        # Points to the local certificates mounted via docker-compose
        ssl_certificate /etc/letsencrypt/live/cerohumano/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/cerohumano/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # 1. Serve subfolder media files straight from the volume data path
        location /images/ {
            alias /var/www/static/images/;
            expires 30d;
            access_log off;
        }

        location /videos/ {
            alias /var/www/static/videos/;
            expires 30d;
            access_log off;
        }

        # 2. Reverse Proxy directly to your application service container name
        location / {
            proxy_pass http://cerohumano_server:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
